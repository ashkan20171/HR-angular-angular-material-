<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">
      <span>⚡</span>
      <h2>AshkanHR</h2>
    </div>

    <nav class="menu">
      <ul>

        <!-- منو بر اساس نقش -->
        <ng-container *ngFor="let item of menu">
          <li *ngIf="auth.hasPermission(item.permission)">
            <a
              [routerLink]="item.link"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              {{ item.icon }} {{ item.title }}
            </a>
          </li>
        </ng-container>

      </ul>
    </nav>

  </aside>

  <!-- Content wrapper -->
  <div class="content-area">

    <!-- Header -->
    <header class="header">

      <!-- (اختیاری) اگر واقعاً route notifications نداری، این بخش رو حذف کن -->
      <!--
      <div class="notif-icon" routerLink="notifications">
        🔔
        <span class="badge">{{ notif.unreadCount() }}</span>
      </div>
      -->

      <!-- User info -->
      <div class="user-box">
        <span class="name">{{ userName }}</span>
        <span class="role">({{ userRole }})</span>
      </div>

      <!-- Logout -->
      <button class="logout-btn" (click)="logout()">
        خروج
      </button>

    </header>

    <!-- Page content -->
    <main class="main">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
