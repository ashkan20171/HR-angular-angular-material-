<div class="profile" *ngIf="applicant">

  <div class="top">
    <button class="btn ghost" (click)="back()">← بازگشت</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="head">
        <div class="avatar">👤</div>
        <div>
          <h2>{{ applicant.name }}</h2>
          <div class="sub">{{ applicant.email }}</div>
          <div class="sub" *ngIf="applicant.phone">{{ applicant.phone }}</div>
        </div>
      </div>

      <div class="row">
        <div class="k">وضعیت</div>
        <div class="v">
          <span class="badge" [class.new]="applicant.status==='new'"
                [class.review]="applicant.status==='review'"
                [class.interview]="applicant.status==='interview'"
                [class.accepted]="applicant.status==='accepted'"
                [class.rejected]="applicant.status==='rejected'">{{ applicant.status }}</span>
        </div>
      </div>

      <div class="row">
        <div class="k">تجربه</div>
        <div class="v">{{ applicant.experience }}</div>
      </div>

      <div class="row">
        <div class="k">مهارت‌ها</div>
        <div class="v skills">
          <span class="skill" *ngFor="let s of applicant.skills">{{ s }}</span>
          <span class="muted" *ngIf="!applicant.skills?.length">—</span>
        </div>
      </div>

      <div class="row" *ngIf="applicant.resumeUrl">
        <div class="k">رزومه</div>
        <div class="v">
          <a [href]="applicant.resumeUrl" target="_blank" rel="noopener">مشاهده</a>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>یادداشت‌ها</h3>

      <div class="note-box">
        <textarea class="input" rows="3" [(ngModel)]="noteText" placeholder="یادداشت جدید..."></textarea>
        <button class="btn primary" (click)="addNote()">ثبت</button>
      </div>

      <div class="notes" *ngIf="notes.length>0; else empty">
        <div class="note" *ngFor="let n of notes; let i=index">
          <div class="note-top">
            <div class="date">{{ n.date | persianDate:{dateStyle:'medium', timeStyle:'short'} }}</div>
            <button class="x" (click)="deleteNote(i)">✕</button>
          </div>
          <div class="text">{{ n.text }}</div>
        </div>
      </div>

      <ng-template #empty>
        <div class="empty">هنوز یادداشتی ثبت نشده.</div>
      </ng-template>
    </div>
  </div>
</div>
