<div class="toast-wrap" aria-live="polite" aria-relevant="additions removals">
  <div class="toast" *ngFor="let t of toasts()" [class]="'toast ' + t.type" role="status">
    <div class="left">
      <div class="icon">{{ icon(t.type) }}</div>
      <div class="content">
        <div class="title" *ngIf="t.title">{{ t.title }}</div>
        <div class="msg">{{ t.message }}</div>
      </div>
    </div>
    <button class="close" (click)="toast.dismiss(t.id)" aria-label="Close">✕</button>
  </div>
</div>
